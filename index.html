<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lens Optics Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; }
        #root { min-height: 100vh; }
        canvas { max-width: 100%; height: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root">正在載入實驗室設備...</div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const CM_TO_PX = 20;
            const [focalLength, setFocalLength] = useState(5.0);
            const [objectDistance, setObjectDistance] = useState(12.0);
            const [objectHeight, setObjectHeight] = useState(3.0);
            const [showRays, setShowRays] = useState({ r1: true, r2: true });
            const [lensMode, setLensMode] = useState('both'); 

            const canvasRef = useRef(null);

            const calcImageData = (u, f, isConvex) => {
                const effectiveF = isConvex ? f : -f;
                const diff = u - effectiveF;
                if (Math.abs(diff) < 0.1) return { v: null, h: null, nature: "無成像 (焦點上)", m: 0 };
                const v = (effectiveF * u) / diff;
                const m = -v / u;
                const nature = `${Math.abs(m) > 1.01 ? "放大" : "縮小"}${m > 0 ? "正立" : "倒立"}${v > 0 ? "實像" : "虛像"}`;
                return { v, h: objectHeight * m, nature, m: Math.abs(m) };
            };

            const draw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const cx = width / 2, cy = height / 2;
                
                ctx.clearRect(0, 0, width, height);
                // 畫主軸
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(width, cy); ctx.stroke();
                
                const f_px = focalLength * CM_TO_PX;
                // 畫焦點
                ctx.fillStyle = '#ef4444';
                [cx-f_px, cx+f_px, cx-2*f_px, cx+2*f_px].forEach(x => {
                    ctx.beginPath(); ctx.arc(x, cy, 3, 0, Math.PI*2); ctx.fill();
                });

                // 畫物體
                const ox = cx - objectDistance * CM_TO_PX;
                const oy = cy - objectHeight * CM_TO_PX;
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(ox, cy); ctx.lineTo(ox, oy); ctx.stroke();

                // 畫透鏡與光線
                const drawContent = (isConvex, color) => {
                    const img = calcImageData(objectDistance, focalLength, isConvex);
                    ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(cx, cy-150); ctx.lineTo(cx, cy+150); ctx.stroke();
                    
                    if (img.v !== null) {
                        const ix = cx + img.v * CM_TO_PX, iy = cy - img.h * CM_TO_PX;
                        ctx.strokeStyle = color; ctx.setLineDash(img.v < 0 ? [5,5] : []);
                        ctx.beginPath(); ctx.moveTo(ix, cy); ctx.lineTo(ix, iy); ctx.stroke(); ctx.setLineDash([]);
                    }
                };

                if (lensMode === 'convex' || lensMode === 'both') drawContent(true, '#dc2626');
                if (lensMode === 'concave' || lensMode === 'both') drawContent(false, '#9333ea');
            };

            useEffect(() => { draw(); }, [focalLength, objectDistance, lensMode]);

            return (
                <div className="p-4 md:p-10 max-w-6xl mx-auto">
                    <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col md:flex-row gap-8">
                        <div className="w-full md:w-1/4 space-y-6">
                            <h2 className="text-xl font-bold text-slate-800">控制面板</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-sm font-medium text-slate-500">焦距: {focalLength}cm</label>
                                    <input type="range" min="2" max="8" step="0.5" value={focalLength} onChange={e=>setFocalLength(Number(e.target.value))} className="w-full" />
                                </div>
                                <div>
                                    <label className="text-sm font-medium text-slate-500">物距: {objectDistance}cm</label>
                                    <input type="range" min="2" max="20" step="0.5" value={objectDistance} onChange={e=>setObjectDistance(Number(e.target.value))} className="w-full" />
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={()=>setLensMode('convex')} className="bg-rose-500 text-white p-2 rounded text-sm">凸透鏡模式</button>
                                    <button onClick={()=>setLensMode('concave')} className="bg-purple-500 text-white p-2 rounded text-sm">凹透鏡模式</button>
                                    <button onClick={()=>setLensMode('both')} className="bg-slate-800 text-white p-2 rounded text-sm">對比模式</button>
                                </div>
                            </div>
                        </div>
                        <div className="w-full md:w-3/4">
                            <canvas ref={canvasRef} width={800} height={400} className="w-full" />
                            <div className="mt-4 p-4 bg-slate-50 rounded-xl text-sm font-mono">
                                提示：紅色為凸透鏡成像，紫色為凹透鏡成像。
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
