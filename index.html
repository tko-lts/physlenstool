        const { useState, useEffect, useRef } = React;

        const App = () => {
            const CM_TO_PX = 20;
            const [focalLength, setFocalLength] = useState(5.0);
            const [objectDistance, setObjectDistance] = useState(12.0);
            const [objectHeight, setObjectHeight] = useState(3.0);

            const [showImage, setShowImage] = useState(true);
            const [lensMode, setLensMode] = useState('both'); 

            const canvasRef = useRef(null);

            const calcImageData = (u, f, isConvex) => {
                const effectiveF = isConvex ? f : -f;
                const diff = u - effectiveF;
                if (Math.abs(diff) < 0.1) return { v: null, h: null, nature: "無成像 (焦點上)", m: 0 };
                const v = (effectiveF * u) / diff;
                const m = -v / u;
                const magType = Math.abs(m) > 1.01 ? "放大" : (Math.abs(m) < 0.99 ? "縮小" : "等大");
                const orient = m > 0 ? "正立" : "倒立";
                const type = v > 0 ? "實像" : "虛像";
                return { v: parseFloat(v.toFixed(2)), h: parseFloat((objectHeight * m).toFixed(2)), nature: `${magType}${orient}${type}`, m: Math.abs(m) };
            };

                ctx.strokeStyle = '#334155'; ctx.lineWidth = 2.5;
                const lh = 160;
                ctx.beginPath(); ctx.moveTo(centerX, centerY - lh); ctx.lineTo(centerX, centerY + lh); ctx.stroke();
                if (isConvex) {
                    ctx.beginPath(); ctx.moveTo(centerX-12, centerY-lh+12); ctx.lineTo(centerX, centerY-lh); ctx.lineTo(centerX+12, centerY-lh+12); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(centerX-12, centerY+lh-12); ctx.lineTo(centerX, centerY+lh); ctx.lineTo(centerX+12, centerY+lh-12); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.moveTo(centerX-12, centerY-lh); ctx.lineTo(centerX, centerY-lh+12); ctx.moveTo(centerX+12, centerY-lh); ctx.lineTo(centerX, centerY-lh+12); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(centerX-12, centerY+lh); ctx.lineTo(centerX, centerY+lh-12); ctx.moveTo(centerX+12, centerY+lh); ctx.lineTo(centerX, centerY+lh-12); ctx.stroke();
                }
            };
